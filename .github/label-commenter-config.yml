labels:
  - name: "invalid"
    labeled:
      issue:
        body: |
            This issue has been closed because you did not provide the requested information.
        action: "close"
  - name: "support"
    labeled:
      issue:
        body: |
            This issue has been closed as we only track bugs here.
            
            You can get community support on [forums](https://forum.glpi-project.org/) or you can consider [taking a subscription](https://glpi-project.org/subscriptions/) to get professional support.
            You can also [contact GLPI editor team](https://portal.glpi-network.com/contact-us) directly.
        action: close
  - name: "feature suggestion"
    labeled:
      issue:
        body: |
            This issue has been closed as we only track bugs here.
            
            You can open a topic to discuss with community about this enhancement on [suggestion website](https://glpi.userecho.com/).
            You can also [contact GLPI editor team](https://portal.glpi-network.com/contact-us) directly if you are willing to sponsor this feature.
        action: close
  - name: "IA only"
    labeled:
      issue:
        body: |
            This issue has been closed because it appears your contribution comes (almost) verbatim from an IA agent.
            
            We do not want to debate with IA bots; this is too much time consuming. See CONTRIBUTING.md
        action: "close"
  - name: needs-discussion
    labeled:
      pr:
        body: |
          This PR has been closed because no prior issue was opened to discuss the change.

          Per [CONTRIBUTING.md](https://github.com/glpi-project/glpi/blob/main/CONTRIBUTING.md), changes other than trivial fixes (typos, broken links) must start with a bug report or feature proposal so we can confirm the change is wanted, belongs in core rather than a plugin, and isn't a duplicate effort.

          To proceed: open an issue, wait for confirmation, then submit the PR with the issue linked.
        action: close